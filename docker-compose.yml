version: '3.8'

services:
  # 1. PostgreSQL Database - why alpine over postgres latest image?
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexusdiet
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Mount the initialization script
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:z
    ports:
      # Expose for local debugging if needed, though 'tracker' connects internally
      - "5433:5432"
    networks:
      - backend

  # 2. Go Backend
  tracker:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      # Connect using the internal Docker network hostname ('db')
      DATABASE_URL: postgres://nexus:nexus@db:5432/nexusdiet
    depends_on:
      - db
    # Expose port 3000 to the host for the host-running Caddy
    ports:
      - "3000:3000"
    networks:
      - backend


volumes:
  pgdata:

networks:
  backend:
    driver: bridge
