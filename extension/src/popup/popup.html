<!DOCTYPE html>
<html>

<head>
  <title>Nexus Diet</title>
  <style>
    body {
      width: 250px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      padding: 15px;
      margin: 0;
      background: #f9fafb;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    h1 {
      font-size: 14px;
      font-weight: 600;
      color: #111827;
      margin: 0 0 10px 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-card {
      background: white;
      border: 1px solid #e5e7eb;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    .label {
      font-weight: 500;
      font-size: 11px;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.025em;
      margin-bottom: 4px;
    }

    .value {
      font-size: 13px;
      color: #1f2937;
      word-break: break-word;
      line-height: 1.4;
    }

    .btn {
      background: #2563eb;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: background 0.2s;
      width: 100%;
    }

    .btn:hover:not(:disabled) {
      background: #1d4ed8;
    }

    .btn:disabled {
      background: #9ca3af;
      cursor: not-allowed;
      opacity: 0.7;
    }

    .config-section {
      margin-top: 5px;
      padding-top: 10px;
      border-top: 1px solid #e5e7eb;
    }

    input[type="text"] {
      width: 100%;
      padding: 6px 8px;
      font-size: 12px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      box-sizing: border-box;
      margin-top: 4px;
    }

    .checkbox-container {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    .checkbox-container input[type="checkbox"] {
      margin: 0;
      cursor: pointer;
    }

    .checkbox-container label {
      font-size: 12px;
      color: #374151;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
      Nexus Diet
    </h1>

    <div class="status-card">
      <div class="label">Current Page</div>
      <div class="value" id="page-title">Detecting...</div>
    </div>

    <button id="send-data-btn" class="btn" style="margin-bottom: 4px;">
      Send
    </button>

    <button id="open-dashboard" class="btn" style="background: #4b5563;">
      Dashboard
    </button>

    <div class="config-section">
      <div class="label">Settings</div>
      
      <div class="checkbox-container">
        <input type="checkbox" id="auto-send-checkbox">
        <label for="auto-send-checkbox">Send data automatically</label>
      </div>

      <div class="label" style="margin-top: 12px;">Server Connection</div>
      <div id="server-url-container">
        <input type="text" id="server-ip" placeholder="localhost" title="Enter Go Backend IP or Domain">
      </div>
    </div>
  </div>
  <script src="popup.js" type="module"></script>
</body>

</html>
