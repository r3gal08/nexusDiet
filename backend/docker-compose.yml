version: '3.8'

services:
  # 1. PostgreSQL Database - why alpine over postgres latest image?
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Mount the initialization script
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:z
    ports:
      # Expose for local debugging if needed, though 'tracker' connects internally
      - "5433:5432"
    networks:
      - backend

  # 2. Go Backend
  tracker:
    image: r3gal08/nexus-tracker:latest
    build: 
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file: .env
    environment:
      # Connect using the internal Docker network hostname ('db')
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      - db
    # Expose port 3000 to the host for the host-running Caddy
    ports:
      - "3000:3000"
    networks:
      - backend

  # 3. Ollama for Image Processing
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: always
    networks:
      - backend

volumes:
  pgdata:
  ollama_data:

networks:
  backend:
    driver: bridge
